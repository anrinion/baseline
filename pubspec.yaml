  sdk: ^3.11.4
dependencies:
  flutter_skill: ^0.2.6
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.5.0
  cupertino_icons: ^1.0.9
