name: Baseline
description: "Simple self-care app."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.11.4
dependencies:
  flutter_skill: ^0.2.6
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_launcher_icons: ^0.14.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
flutter:
  uses-material-design: true
  generate: true
