on:
  workflow_dispatch:
    inputs:
      dev_version:
        description: 'Dev version to promote (e.g., v0.0.42-dev+123)'
        required: true
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Validate version format
        run: |
          VERSION="${{ inputs.dev_version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-dev\+[0-9]+$ ]]; then
            echo "Error: Version must match pattern vX.Y.Z-dev+NNN"
            exit 1
          fi
          echo "Promoting version: $VERSION"

      - name: Get dev release commit SHA
        id: get_commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DEV_TAG="${{ inputs.dev_version }}"
          echo "Fetching release for tag: $DEV_TAG"
          RELEASE_DATA=$(gh api repos/${{ github.repository }}/releases/tags/$DEV_TAG)
          TARGET_SHA=$(echo "$RELEASE_DATA" | jq -r '.target_commitish')
          echo "dev_commit=$TARGET_SHA" >> $GITHUB_OUTPUT
          echo "Dev release commit SHA: $TARGET_SHA"

      - name: Compute production version
        id: version
        run: |
          DEV_TAG="${{ inputs.dev_version }}"   # e.g. v0.0.42-dev+123
          # strip leading "v" and everything after "-dev"
          PROD_VERSION="${DEV_TAG#v}"           # 0.0.42-dev+123
          PROD_VERSION="${PROD_VERSION%-dev*}"  # 0.0.42
          echo "prod_version=$PROD_VERSION" >> $GITHUB_OUTPUT
          echo "Production version: $PROD_VERSION"

      - name: Download dev release artifacts
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ inputs.dev_version }}
          fileName: "*"
          out-file-path: "artifacts"

      - name: Create Production Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.prod_version }}
          name: Release ${{ steps.version.outputs.prod_version }}
          target_commitish: ${{ steps.get_commit.outputs.dev_commit }}
          files: artifacts/*
