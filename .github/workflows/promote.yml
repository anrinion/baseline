on:
  workflow_dispatch:
    inputs:
      dev_version:
        description: 'Dev version to promote (e.g., 0.0.42-dev)'
        required: true
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Validate version format
        run: |
          VERSION="${{ inputs.dev_version }}"
          if [[ ! "$VERSION" =~ -dev$ ]]; then
            echo "Error: Version must end with '-dev'"
            exit 1
          fi
          echo "Promoting version: $VERSION"

      - name: Get dev release commit SHA
        id: get_commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DEV_TAG="v${{ inputs.dev_version }}"
          echo "Fetching release for tag: $DEV_TAG"
          RELEASE_DATA=$(gh api repos/${{ github.repository }}/releases/tags/$DEV_TAG)
          TARGET_SHA=$(echo "$RELEASE_DATA" | jq -r '.target_commitish')
          echo "dev_commit=$TARGET_SHA" >> $GITHUB_OUTPUT
          echo "Dev release commit SHA: $TARGET_SHA"

      - name: Compute production version
        id: version
        run: |
          DEV_VERSION="${{ inputs.dev_version }}"
          PROD_VERSION="${DEV_VERSION%-dev}"
          echo "prod_version=$PROD_VERSION" >> $GITHUB_OUTPUT
          echo "Production version: $PROD_VERSION"

      - name: Checkout dev release commit
        run: |
          git checkout ${{ steps.get_commit.outputs.dev_commit }}
          echo "Checked out commit: ${{ steps.get_commit.outputs.dev_commit }}"

      - name: Download dev release artifacts
        uses: robinraju/release-downloader@v1
        with:
          tag: v${{ inputs.dev_version }}
          fileName: "*"
          out-file-path: "artifacts"

      - name: Create Production Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.prod_version }}
          name: Release ${{ steps.version.outputs.prod_version }}
          target_commitish: ${{ steps.get_commit.outputs.dev_commit }}
          files: artifacts/*
