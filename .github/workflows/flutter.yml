on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Read version from pubspec.yaml
        id: version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | head -1)
          VERSION_STRING=$(echo "$VERSION_LINE" | awk '{print $2}')
          VERSION_NAME="${VERSION_STRING%%+*}"
          VERSION_CODE="${VERSION_STRING##*+}"

          # dev builds always get a unique suffix
          SUFFIX="-dev+${{ github.run_number }}"
          RELEASE_TAG="${VERSION_NAME}${SUFFIX}"

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME ($VERSION_CODE)"
          echo "Release tag: $RELEASE_TAG"

      - name: Fetch Flutter tags for version detection
        run: |
          cd .flutter
          git fetch --tags origin

      - name: Set up Flutter from submodule
        run: |
          echo "$GITHUB_WORKSPACE/.flutter/bin" >> $GITHUB_PATH
          echo "PUB_CACHE=$GITHUB_WORKSPACE/.pub-cache" >> $GITHUB_ENV
          .flutter/bin/flutter config --no-analytics

      - name: Flutter init
        run: |
          flutter --version
          flutter pub get

      - name: Flutter test
        run: flutter test

      - name: Setup Keystore
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding baseline-app-key.jks"
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/baseline-app-key.jks
            echo "storeFile=baseline-app-key.jks" > android/key.properties
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          else
            echo "No signing secrets available. Using default debug keystore."
          fi

      - name: Patch dartjni to disable build ID
        run: |
          JNI_CMAKE=$(find $PUB_CACHE/hosted/pub.dev -path "*/jni-*/src/CMakeLists.txt" | head -n 1)
          if [ -n "$JNI_CMAKE" ] && [ -f "$JNI_CMAKE" ]; then
            sed -i '2i add_link_options("LINKER:--build-id=none")' "$JNI_CMAKE"
            echo "Patched CMakeLists.txt in $JNI_CMAKE"
          else
            echo "Error: jni CMakeLists.txt not found in expected location."
            exit 1
          fi

      - name: Android build
        run: |
          flutter build apk                     # universal APK
          flutter build apk --split-per-abi     # per-ABI APKs
          flutter build appbundle

      - name: Upload APK/AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            build/app/outputs/flutter-apk/
            build/app/outputs/bundle/release/app-release.aab

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.release_tag }}
          name: Release ${{ needs.build.outputs.release_tag }}
          files: |
            flutter-apk/*.apk
            bundle/release/app-release.aab